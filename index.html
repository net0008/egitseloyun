<!DOCTYPE html>
<html lang="tr">
<head>

    <main class="login-screen">

        </div>

        <div class="login-frame">

            <div class="team-grid">

                <button onclick="startMission('Dede Korkut')">DEDE KORKUT</button>
                <button onclick="startMission('Türk Tim')">TÜRK TİM</button>

                <button onclick="startMission('Kurtalan Ekspres')">KURTALAN EKSPRES</button>

        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="assets/js/main.js"></script>
    <script src="components/header.js"></script>
    <script src="components/footer.js"></script>
