<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operasyon Terminali | Bergama 2050</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="op-screen">
    <div id="header-placeholder"></div>

    <main class="operation-layout">
        <section class="visual-panel">
            <div class="panel-header">SEKTÖR ANALİZ GÖRÜNTÜSÜ</div>
            <div class="map-frame">
                <img id="active-map" src="assets/img/sektor_2a.jpg" alt="Harita Yükleniyor...">
                <div class="scan-line"></div>
            </div>
        </section>

        <section class="command-panel">
            <div class="terminal-log" id="terminal-output">
                <p>> [SİSTEM]: Bağlantı kuruldu.</p>
                <p>> [KOMUTAN]: Analistler, 2A sektöründeki en yüksek izohipsi belirleyin.</p>
            </div>
            
            <div class="mission-input">
                <label>$ KRİPTO_KOD_GİRİŞİ:</label>
                <input type="text" id="user-input" placeholder="Veri bekleniyor...">
                <button class="cyber-btn" onclick="processData()">ONAYLA</button>
            </div>

            <div class="hint-control">
                <button onclick="useHint()">İPUCU İSTE (Lojistik)</button>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="assets/js/main.js"></script>
    <script src="components/header.js"></script>
    <script src="components/footer.js"></script>
</body>
</html>
