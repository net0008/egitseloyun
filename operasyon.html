<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operasyon Terminali | Analiz</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="op-screen">
    <div id="header-placeholder"></div>


    <main class="operation-layout">
        <section class="visual-panel">
            <div class="panel-tag">UYDU ANALİZİ: AKTİF</div>
               <p class="sys-msg">Puan: <span id="current-score">1000</span> | Sektör: <span id="current-sector">2A</span></p>
            <ul id="team-members-list"></ul>
            <div class="map-frame">
                <img id="active-map" src="assets/img/sektor_2a.jpg" alt="Harita Bekleniyor...">
                <div class="scan-line"></div>
            </div>
        </section>

        <section class="command-panel">
            <div class="terminal-header">GÖREV GÜNLÜĞÜ</div>
            <div class="terminal-log" id="terminal-output">
                <p class="sys-msg">> [SİSTEM]: Güvenli bağlantı sağlandı.</p>
                <p>> [MERKEZ]: Sektör 2A'daki irtifa verisi kriptolandı. x² protokolünü uygulayın.</p>
            </div>
            
            <div class="mission-input">
                <label>$ ANALİST_GİRİŞİ: </label>
                <input type="number" id="kripto-val" placeholder="Kod..." autocomplete="off">
                <button class="cyber-btn" id="btn-verify">ONAYLA</button>
            </div>

            <div class="extra-tools">
                <button id="btn-hint" class="cyber-btn hint">İPUCU TALEBİ</button>
                <a href="kilavuz.html" class="cyber-btn secondary">SAHA REHBERİ</a>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module" src="assets/js/ops_engine.js"></script>
    <script src="components/header.js"></script>
    <script src="components/footer.js"></script>
</body>
</html>
