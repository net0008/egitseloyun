<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operasyon Terminali | Saha Analizi v3.3</title>
    <link rel="stylesheet" href="assets/css/style.css">
    
    <!-- Leaflet Harita Motoru (Ana Kütüphane) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Leaflet Draw (Çizim ve Çerçeve Belirleme Eklentisi) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <style>
        .star-rating { font-size: 1.5rem; color: #444; margin: 10px 0; letter-spacing: 5px; }
        .star.filled { color: #39FF14; text-shadow: 0 0 10px #39FF14; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: #111; margin: 5% auto; padding: 20px; border: 1px solid #39FF14; width: 80%; height: 80%; position: relative; }
        .close-btn { position: absolute; right: 20px; top: 10px; color: #ff3e3e; font-size: 1.5rem; cursor: pointer; border: 1px solid #ff3e3e; padding: 5px 10px; }
        .warning-text { color: #ff3e3e; font-weight: bold; }
    </style>
</head>
<body class="op-screen">
    <div id="header-placeholder"></div>

    <main class="operation-layout">
        <section class="visual-panel">
            <div class="panel-tag" id="team-name-display">UYDU ANALİZİ: AKTİF</div>
            
            <div class="star-rating" id="star-container">
                <span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span>
            </div>

            <p class="sys-msg">
                Puan: <span id="current-score" class="neon-text">1000</span> | 
                <span id="current-sector">1. Görev 2A Bölgesi</span>
            </p>

            <div class="map-frame">
                <div id="map-loader" class="map-loader">
                    <div class="loader-spinner"></div>
                    <div class="loader-text">UYDU BAĞLANTISI KURULUYOR...</div>
                </div>
                <div id="map-content-wrapper" class="map-viewport">
                    <img id="active-map" alt="Analiz Bekleniyor..." style="display:none;">
                    <iframe id="active-frame" allowfullscreen></iframe>
                    <div class="scan-line"></div>
                    <div class="map-overlay-barrier"></div>
                </div>
                <div class="zoom-controls" style="display:none;">
                    <div class="zoom-row">
                        <label for="zoom-slider">MANUEL</label>
                        <input type="range" id="zoom-slider" min="8" max="20" value="11" step="1">
                        <span id="zoom-value" class="zoom-value-display">11x</span>
                    </div>
                    <div class="zoom-row">
                        <label for="mouse-zoom-slider">MOUSE</label>
                        <input type="range" id="mouse-zoom-slider" min="8" max="20" value="11" step="1" disabled>
                        <span id="mouse-zoom-value" class="zoom-value-display">11x</span>
                    </div>
                </div>
            </div>
            
            <ul id="team-members-list" class="team-roster"></ul>
        </section>

        <section class="command-panel">
    <div class="terminal-header">GÖREV GÜNLÜĞÜ</div>
    <div class="terminal-log" id="terminal-output"></div>
    
   <div class="input-group">
    <label>$ ANALİST_GİRİŞİ: </label>
    <input type="text" id="kripto-val" placeholder="Analiz Sonucu..." autocomplete="off">
    <button class="cyber-btn primary" id="btn-verify">ONAYLA</button>
</div>

    <div class="extra-tools">
        <button id="btn-hint" class="cyber-btn hint">İPUCU TALEBİ (-50 PUAN)</button>
        <button id="btn-open-manual" class="cyber-btn secondary">📂 SAHA KILAVUZU</button>
    </div>
</section>
    </main>

    <div id="manual-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="btn-close-manual">X KAPAT</span>
            <iframe id="pdf-viewer" src="assets/pdf/saha_kilavuzu.pdf" width="100%" height="90%" frameborder="0"></iframe>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script type="module" src="ops_engine.js"></script>
    <script src="components/header.js"></script>
    <script src="components/footer.js"></script>

    <script>
        const modal = document.getElementById("manual-modal");
        const openBtn = document.getElementById("btn-open-manual");
        const closeBtn = document.getElementById("btn-close-manual");
        openBtn.onclick = () => modal.style.display = "block";
        closeBtn.onclick = () => modal.style.display = "none";
        window.onclick = (e) => { if (e == modal) modal.style.display = "none"; }
    </script>
</body>
</html>
