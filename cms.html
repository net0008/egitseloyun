<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS | Görev Yönetim Paneli</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            background: #050505;
        }
        .cms-container {
            max-width: 1600px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .mission-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 30px;
            padding-bottom: 120px; /* Footer için boşluk */
        }
        .mission-card {
            border: 1px solid var(--border-color);
            background: var(--panel-bg);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group textarea {
            width: 100%;
            background: #000;
            color: var(--neon-green);
            border: 1px solid var(--border-color);
            padding: 10px;
            font-family: inherit;
            resize: vertical;
        }
        .form-group textarea { min-height: 80px; }
        .mode-toggle { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .preview-box {
            border: 1px dashed var(--border-color);
            background: #000;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .preview-box img, .preview-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: none;
        }
        .preview-text { font-size: 0.8rem; color: #666; }

        .sticky-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 15px; text-align: center; border-top: 2px solid var(--neon-green); box-shadow: 0 -5px 20px rgba(0,0,0,0.8); z-index: 100; }
        .save-btn { background: var(--neon-green); color: #000; border: none; padding: 12px 40px; font-size: 1.1rem; font-weight: bold; cursor: pointer; border-radius: 30px; transition: all 0.2s; }
        .save-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--neon-green); }
        .save-btn:disabled { background: #555; color: #999; cursor: not-allowed; transform: none; box-shadow: none; }

        .helper-text { font-size: 0.8rem; color: #666; margin-top: 3px; }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="cms-container">
        <div id="mission-grid" class="mission-grid">
            <!-- Görev kartları buraya dinamik olarak eklenecek -->
        </div>
    </div>

    <div class="sticky-footer">
        <button class="save-btn" onclick="saveAllMissions()" disabled>Veriler Yükleniyor...</button>
    </div>

    <div id="footer-placeholder"></div>

    <script type="module">
        import { db, ref, set, onValue } from './assets/js/firebase-config.js';

        const missionContainer = document.getElementById('mission-grid');
        const missionsRef = ref(db, 'gameContent/missions');

        onValue(missionsRef, (snapshot) => {
            const data = snapshot.val() || {};
            renderForms(data);
        }, {
            onlyOnce: true // Sayfa ilk açıldığında veriyi bir kez çek
        });


        function normalizeVisualUrl(url = '') {
            const trimmed = String(url || '').trim();
            if (!trimmed) return '';
            if (trimmed.startsWith('//')) return `https:${trimmed}`;
            return trimmed;
        }

        function parseMissionVisual(content = '') {
            const clean = String(content || '').trim();
            if (!clean) return { type: 'none', url: '' };

            const iframeMatch = clean.match(/<iframe[\s\S]*?<\/iframe>/i);
            if (iframeMatch) {
                const srcMatch = iframeMatch[0].match(/src=["']([^"']+)["']/i);
                return {
                    type: srcMatch?.[1] ? 'iframe' : 'invalid',
                    url: normalizeVisualUrl(srcMatch?.[1] || ''),
                };
            }

            const normalizedUrl = normalizeVisualUrl(clean);
            if (/(google\.[^/]+\/maps|maps\.google\.|maps\.app\.goo\.gl|goo\.gl\/maps|umap\.openstreetmap\.fr)/i.test(normalizedUrl)) {
                return { type: 'iframe', url: normalizedUrl };
            }

            return { type: 'image', url: normalizedUrl };
        }

        function renderForms(data) {
            let allMissionsHTML = "";
            for (let i = 1; i <= 10; i++) {
                const mission = data[i] || {};
                const defaultImg = ``; // Varsayılan resim yok
                const currentImg = mission.image || defaultImg;

                allMissionsHTML += `
                    <div class="mission-card">
                        <div class="card-header">
                            <h3>GÖREV ${i}</h3>
                            <label class="mode-toggle" title="Cevapların sırasını zorunlu kıl">
                                <input type="checkbox" id="mode-${i}" ${mission.requireAll ? 'checked' : ''}>
                                <span>🔗 SIRALI KOMBİNASYON</span>
                            </label>
                        </div>
                        <div class="form-group">
                            <label for="q-${i}">Soru</label>
                            <textarea id="q-${i}">${mission.question || ''}</textarea>
                        </div>
                        <div class="form-group">
                            <label for="a-${i}">Cevaplar (Virgülle ayırın)</label>
                            <input type="text" id="a-${i}" value="${mission.answers || ''}">
                        </div>
                        <div class="form-group">
                            <label for="h-${i}">İpuçları (Her satıra bir ipucu)</label>
                            <textarea id="h-${i}">${mission.hints || ''}</textarea>
                        </div>
                        <div class="form-group">
                            <label for="img-${i}">Görev Görseli (Resim URL'i veya iframe kodu)</label>
                            <textarea id="img-${i}" oninput="updatePreview(${i})">${currentImg}</textarea>
                        </div>
                        <div class="preview-box">
                            <span id="prev-txt-${i}" class="preview-text">Önizleme Alanı</span>
                            <img id="prev-img-${i}" style="display:none;">
                            <iframe id="prev-iframe-${i}" style="display:none;" allowfullscreen></iframe>
                        </div>
                    </div>
                `;
            }
            missionContainer.innerHTML = allMissionsHTML;

            // Formlar DOM'a eklendikten sonra, her birinin önizlemesini tetikle.
            for (let i = 1; i <= 10; i++) {
                setTimeout(() => updatePreview(i), 0);
            }
            
            const saveBtn = document.querySelector('.save-btn');
            if (saveBtn) {
                saveBtn.disabled = false;
                saveBtn.innerText = '💾 DEĞİŞİKLİKLERİ KAYDET VE YAYINLA';
            }
        }

        window.updatePreview = function(id) {
            const content = document.getElementById(`img-${id}`).value;
            const img = document.getElementById(`prev-img-${id}`);
            const iframe = document.getElementById(`prev-iframe-${id}`);
            const txt = document.getElementById(`prev-txt-${id}`);
            const parsed = parseMissionVisual(content);

            if (parsed.type === 'iframe') {
                iframe.src = parsed.url;
                iframe.style.display = "block";
                img.style.display = "none";
                txt.style.display = "none";
            } else if (parsed.type === 'image') {
                img.src = parsed.url;
                img.style.display = "block";
                iframe.style.display = "none";
                txt.style.display = "none";
            } else if (parsed.type === 'invalid') {
                img.style.display = "none";
                iframe.style.display = "none";
                txt.style.display = "block";
                txt.innerText = 'Geçersiz iframe kodu (src bulunamadı).';
            } else {
                img.style.display = "none";
                iframe.style.display = "none";
                txt.style.display = "block";
                txt.innerText = 'Önizleme Alanı';
            }
        };

        window.saveAllMissions = function() {
            const btn = document.querySelector('.save-btn');
            try {
                const missions = {};
                for (let i = 1; i <= 10; i++) {
                    const qEl = document.getElementById(`q-${i}`);
                    const aEl = document.getElementById(`a-${i}`);
                    const hEl = document.getElementById(`h-${i}`);
                    const imgEl = document.getElementById(`img-${i}`);
                    const modeEl = document.getElementById(`mode-${i}`);

                    if (!qEl || !aEl || !hEl || !imgEl || !modeEl) {
                        throw new Error(`DOM elemanı bulunamadı: Görev ${i} içindeki bir alan eksik.`);
                    }

                    const imgVal = imgEl.value.trim();

                    missions[i] = {
                        question: qEl.value.trim(),
                        answers: aEl.value.trim(),
                        hints: hEl.value.trim(),
                        image: imgVal,
                        requireAll: modeEl.checked,
                    };
                }
                
                if (btn) {
                    btn.disabled = true;
                    btn.innerText = "KAYDEDİLİYOR...";
                }

                set(ref(db, 'gameContent/missions'), missions)
                    .then(() => {
                        if (!btn) return;
                        btn.innerText = "✅ BAŞARIYLA KAYDEDİLDİ!";
                        btn.style.background = "#fff";
                        btn.style.color = "#000";
                        setTimeout(() => {
                            btn.innerText = '💾 DEĞİŞİKLİKLERİ KAYDET VE YAYINLA';
                            btn.style.background = "";
                            btn.style.color = "";
                            btn.disabled = false;
                        }, 2500);
                    })
                    .catch(err => { throw err; });
            } catch (err) {
                console.error("Kaydetme sırasında kritik hata:", err);
                alert("HATA: Veriler kaydedilemedi. Lütfen geliştirici konsolunu kontrol edin.\n\n" + err.message);
                if (btn) {
                    btn.disabled = false;
                    btn.innerText = '💾 KAYDETME BAŞARISIZ';
                }
            }
        };
    </script>

    <script src="components/header.js"></script>
    <script src="components/footer.js"></script>
</body>
</html>
