<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operasyon Yönetim Paneli</title>
    <style>
        :root { --primary: #39FF14; --bg: #0a0a0a; --card-bg: #111; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; padding-bottom: 80px; }
        
        h1 { text-align: center; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid var(--primary); padding-bottom: 15px; }
        
        .mission-card { background: var(--card-bg); border: 1px solid #333; border-radius: 8px; padding: 20px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); position: relative; }
        .mission-card:hover { border-color: var(--primary); }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .card-header h3 { margin: 0; color: var(--primary); }
        
        .form-row { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; color: #aaa; }
        input, textarea { width: 100%; background: #000; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 4px; box-sizing: border-box; font-family: monospace; }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; }
        
        .preview-area { margin-top: 10px; text-align: center; background: #000; padding: 10px; border: 1px dashed #444; border-radius: 4px; }
        .preview-area img { max-width: 100%; max-height: 200px; display: none; border: 1px solid var(--primary); }
        .preview-area iframe { width: 100%; height: 200px; display: none; border: 1px solid var(--primary); }
        .preview-text { font-size: 0.8rem; color: #666; }

        .sticky-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 15px; text-align: center; border-top: 2px solid var(--primary); box-shadow: 0 -5px 20px rgba(0,0,0,0.8); z-index: 100; }
        .save-btn { background: var(--primary); color: #000; border: none; padding: 12px 40px; font-size: 1.1rem; font-weight: bold; cursor: pointer; border-radius: 30px; transition: all 0.2s; }
        .save-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--primary); }
        .save-btn:disabled { background: #555; color: #999; cursor: not-allowed; transform: none; box-shadow: none; }

        .helper-text { font-size: 0.8rem; color: #666; margin-top: 3px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>OPERASYON İÇERİK YÖNETİMİ</h1>
        <p style="text-align: center; color: #888;">Soruları, cevapları ve görselleri buradan düzenleyebilirsiniz.</p>
        
        <div id="mission-forms">
            <!-- JavaScript burayı dolduracak -->
            <div style="text-align:center; padding:50px;">Veriler Yükleniyor...</div>
        </div>
    </div>

    <div class="sticky-footer">
        <button class="save-btn" onclick="saveAllMissions()" disabled>Veriler Yükleniyor...</button>
    </div>

    <script type="module">
        import { db, ref, set, onValue } from './assets/js/firebase-config.js';

        const missionContainer = document.getElementById('mission-forms');

        // Firebase'den verileri çek
        onValue(ref(db, 'gameContent/missions'), (snapshot) => {
            const data = snapshot.val() || {};
            renderForms(data);
        });

        function renderForms(data) {
            let allMissionsHTML = "";
            for (let i = 1; i <= 10; i++) {
                const mission = data[i] || {};
                // Varsayılan resim yolu
                const defaultImg = `assets/img/soru${i}.jpg`;
                const currentImg = mission.image || defaultImg;

                allMissionsHTML += `
                    <div class="mission-card">
                        <div class="card-header">
                            <h3>GÖREV ${i}</h3>
                        </div>

                        <div class="form-row">
                            <label>📝 Soru Metni (Brifing):</label>
                            <textarea id="q-${i}" rows="2" placeholder="Merkezden gelen mesajı buraya yazın...">${mission.question || ""}</textarea>
                        </div>

                        <div class="form-row">
                            <label>🖼️ Görev Görseli veya Harita Linki (Google Maps):</label>
                            <input type="text" id="img-${i}" value="${currentImg}" oninput="updatePreview(${i})">
                            <div class="helper-text">Örn: <code>assets/img/soru1.jpg</code>, My Maps veya Standart Link (q=koordinat).</div>
                            
                            <div class="preview-area">
                                <span class="preview-text" id="prev-txt-${i}">Görsel Önizleme</span>
                                <img id="prev-img-${i}" src="${currentImg}" onerror="this.style.display='none'; this.previousElementSibling.style.display='inline';" onload="this.style.display='inline'; this.previousElementSibling.style.display='none';">
                                <iframe id="prev-iframe-${i}"></iframe>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <label>🔑 Doğru Cevaplar (Virgülle ayırın):</label>
                            <input type="text" id="a-${i}" value="${mission.answers || ""}" placeholder="örn: vadi, akarsu yatağı, dere">
                            <div class="helper-text">Büyük/küçük harf fark etmez. Öğrenci bunlardan birini yazarsa kabul edilir.</div>
                        </div>

                                                <div class="form-row" style="background: #1a1a1a; padding: 10px; border-radius: 4px; border: 1px dashed #444;">
                            <label style="display:flex; align-items:center; cursor:pointer; margin:0; color: #39FF14;">
                                <input type="checkbox" id="mode-${i}" ${mission.requireAll ? "checked" : ""} style="width:auto; margin-right:10px;">
                                🔗 SIRALI KOMBİNASYON (Kelimeler belirtilen SIRADA geçmeli)
                            </label>
                            <div class="helper-text">Örn: "plato, ova" yazarsanız, öğrenci cevabında önce platoyu sonra ovayı yazmalıdır.</div>
                        </div>
                        
                        <div class="form-row">
                            <label>💡 İpuçları (Her satıra bir ipucu):</label>
                            <textarea id="h-${i}" rows="3" placeholder="1. İpucu&#10;2. İpucu&#10;3. İpucu">${mission.hints || ""}</textarea>
                        </div>
                    </div>
                `;
            }
            missionContainer.innerHTML = allMissionsHTML;

            // Formlar DOM'a eklendikten sonra, iframe'leri doğru göstermek için
            // her birinin önizlemesini tetikle.
            for (let i = 1; i <= 10; i++) {
                // Gecikme, tarayıcının DOM'u işlemesine zaman tanır.
                setTimeout(() => updatePreview(i), 0);
            }
            // Yükleme tamamlandığında kaydet butonunu aktif et.
            // Bu, form elemanları oluşturulmadan kaydetmeye çalışmayı engeller.
            const saveBtn = document.querySelector('.save-btn');
            if (saveBtn) {
                saveBtn.disabled = false;
                saveBtn.innerText = '💾 DEĞİŞİKLİKLERİ KAYDET VE YAYINLA';
            }
        }

        // Global fonksiyonlar (HTML içinden erişim için window'a atanır)
        window.updatePreview = function(id) {
            let url = document.getElementById(`img-${id}`).value.trim();
            const img = document.getElementById(`prev-img-${id}`);
            const iframe = document.getElementById(`prev-iframe-${id}`);
            const txt = document.getElementById(`prev-txt-${id}`);
            
            let previewUrl = url;
            let isIframe = false;

            if (url.startsWith("<iframe")) {
                const srcMatch = url.match(/src=["']([^"']+)["']/i);
                if (srcMatch && srcMatch[1]) {
                    previewUrl = srcMatch[1];
                    isIframe = true;
                }
            } else if (/(google\.[^/]+\/maps|maps\.google\.|maps\.app\.goo\.gl|goo\.gl\/maps|umap\.openstreetmap\.fr)/i.test(url)) {
                isIframe = true;
            }

            // Protokolü https yap
            if (previewUrl.startsWith('//')) {
                previewUrl = 'https:' + previewUrl;
            }

            if (isIframe) {
                iframe.src = previewUrl;
                iframe.style.display = "block";
                img.style.display = "none";
                txt.style.display = "none";
            } else {
                img.src = previewUrl;
                img.style.display = "block";
                iframe.style.display = "none";
                txt.style.display = "none";
            }
        };

        /**
         * Tüm görevleri Firebase'e kaydeder.
         * HATA DÜZELTMESİ:
         * 1. `ops_engine.js` tam `<iframe>` kodunu işleyebildiği için,
         *    burada `src` linkini ayıklamak yerine ham veriyi kaydediyoruz.
         *    Bu, `ops_engine` tarafındaki "RAW IFRAME MODU"nun doğru çalışmasını sağlar.
         */
        window.saveAllMissions = function() {
            const btn = document.querySelector('.save-btn');
            try {
                const missions = {};
                for (let i = 1; i <= 10; i++) {
                    const qEl = document.getElementById(`q-${i}`);
                    const aEl = document.getElementById(`a-${i}`);
                    const hEl = document.getElementById(`h-${i}`);
                    const imgEl = document.getElementById(`img-${i}`);
                    const modeEl = document.getElementById(`mode-${i}`);

                    if (!qEl || !aEl || !hEl || !imgEl || !modeEl) {
                        throw new Error(`DOM elemanı bulunamadı: Görev ${i} içindeki bir alan eksik. Sayfa yapısı bozulmuş olabilir.`);
                    }

                    missions[i] = {
                        question: qEl.value.trim(),
                        answers: aEl.value.trim(),
                        hints: hEl.value.trim(),
                        image: imgEl.value.trim(),
                        requireAll: modeEl.checked,
                    };
                }
                
                if (btn) {
                    btn.disabled = true;
                    btn.innerText = "KAYDEDİLİYOR...";
                }

                set(ref(db, 'gameContent/missions'), missions)
                    .then(() => {
                        if (!btn) return;
                        const oldText = '💾 DEĞİŞİKLİKLERİ KAYDET VE YAYINLA';
                        btn.innerText = "✅ BAŞARIYLA KAYDEDİLDİ!";
                        btn.style.background = "#fff";
                        btn.style.color = "#000";
                        setTimeout(() => {
                            btn.innerText = oldText;
                            btn.style.background = ""; // Stili sıfırla, CSS sınıfı uygulasın
                            btn.style.color = "";
                            btn.disabled = false;
                        }, 2500);
                    })
                    .catch(err => {
                        throw err; // Genel hata yakalayıcıya gönder
                    });
            } catch (err) {
                console.error("Kaydetme sırasında kritik hata:", err);
                alert("HATA: Veriler kaydedilemedi. Lütfen geliştirici konsolunu kontrol edin.\n\n" + err.message);
                if (btn) {
                    if (!btn) return;
                    btn.disabled = false;
                    btn.innerText = '💾 KAYDETME BAŞARISIZ';
                }
            }
        };
    </script>
</body>
</html>
